# ===================================================================
# Flood Alert Backend - application.properties
# ===================================================================

spring.application.name=flood-alert-backend
server.port=8080

# ---------------------------------------------------------------
# H2 Database (file-based so data survives restarts; switch to
# in-memory by changing the URL to jdbc:h2:mem:floodalert)
# ---------------------------------------------------------------
spring.datasource.url=jdbc:h2:file:./data/floodalert;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 console (useful for local debugging only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------------------------------------------------------------
# File upload
# ---------------------------------------------------------------
app.upload.dir=uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---------------------------------------------------------------
# Preconfigured admin account
# Default password is "Admin@123" -- CHANGE the BCrypt hash below
# for production use. Generate a new one with:
#   htpasswd/bcrypt tools, or Spring Security's BCryptPasswordEncoder
# ---------------------------------------------------------------
app.admin.username=admin
app.admin.password-hash=$2b$10$779jfMCQS056D.g9B2XlBOUoTMZ7Ha7M9oqi6oY.Gzm7XYHC4nBZS

# ---------------------------------------------------------------
# CORS
# ---------------------------------------------------------------
app.cors.allowed-origin=http://localhost:5173

# ---------------------------------------------------------------
# Logging
# ---------------------------------------------------------------
logging.level.com.floodalert=INFO
logging.level.org.springframework.security=WARN
